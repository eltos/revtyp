name: Prek autofix

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  # SSH Deploy Key with write access (needed to trigger push workflow runs in created pull request)
  SSH_KEY: ${{ secrets.SSH_KEY_GITHUB_ACTION }}

jobs:
  prek:
    if: |
      github.actor != 'github-actions[bot]' &&
      !endsWith(github.ref_name, '-prek-auto-fixes')&&
      !endsWith(github.head_ref || '', '-prek-auto-fixes')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          ssh-key: ${{ env.SSH_KEY }}
          fetch-depth: 0

      - name: Install prek
        uses: j178/prek-action@v2
        with:
          install-only: true

      - name: Run prek
        id: changes
        run: |
          set +e
          prek run --all-files
          code=$?
          # exit code 0=passed, 1=formatted, 2=error
          [ $code -ge 2 ] && exit $code
          echo "changed=$code" >> $GITHUB_OUTPUT

      # --- PR behavior: push fixes directly ---
      - name: Commit & push to PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.changed == '1'
        run: |
          if [ "$(git log -1 --pretty=format:'%an')" = "github-actions[bot]" ]; then
            echo "Refusing to push: last commit already came from github-actions[bot]"
            echo "This likely indicates a non-converging autofix loop."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply prek fixes"
          git push

      # --- main branch behavior: create PR instead ---
      - name: Create PR with fixes
        if: github.event_name == 'push' && steps.changes.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ (github.head_ref || github.ref_name) }}-prek-auto-fixes
          commit-message: "Apply prek fixes"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          title: "Formatting fixes (prek)"
